<section class="profile-page">

  <div class="profile-header">
    <div>
      <p class="eyebrow">ClimbConnect</p>
      <h1>Mein Profil</h1>
      <p>Verwalte dein Kletterprofil und deine persönlichen Einstellungen.</p>
    </div>
  </div>

  <div class="profile-layout">

    <section class="profile-card profile-info-card">
      <h2>Profil informationen</h2>

      <div class="form-grid">

        <div class="form-field full-width">
          <label for="bio">Über mich</label>
          <textarea
            id="bio"
            [(ngModel)]="user.bio"
            placeholder="Schreib kurz etwas über dich...">
          </textarea>
        </div>

        <div class="form-field">
          <label for="gradeScale">Bevorzugte Bewertungsskala</label>
          <select id="gradeScale" [(ngModel)]="user.preferredGradeScale">
            <option value="UIAA">UIAA</option>
            <option value="French">Französisch</option>
            <option value="American">Amerikanisch</option>
          </select>
        </div>

        <div class="form-field">
          <label for="averageGrade">Durchschnittlicher Grad</label>
          <input
            id="averageGrade"
            type="text"
            [(ngModel)]="user.averageGrade"
            placeholder="z. B. 6a oder VI">
        </div>

      </div>

      <div class="button-row">
        <button type="button" class="save-button">
          Profil speichern
        </button>
      </div>
    </section>

    <aside class="profile-card statistics-card">
      <h2>Statistiken</h2>

      <div class="stat-list">
        <div class="stat-item">
          <span>Begehungen</span>
          <strong>-</strong>
        </div>

        <div class="stat-item">
          <span>Projekte</span>
          <strong>-</strong>
        </div>

        <div class="stat-item">
          <span>Lieblingsgebiet</span>
          <strong>-</strong>
        </div>
      </div>
    </aside>

  </div>

</section>
