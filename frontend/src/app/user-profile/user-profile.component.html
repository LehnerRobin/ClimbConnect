<h2>My Profile</h2>

<div class="profile-card">

  <h3>Profile Information</h3>

  <label>Bio</label><br>
  <textarea [(ngModel)]="user.bio"></textarea>

  <br><br>

  <label>Preferred Grade Scale</label><br>
  <select [(ngModel)]="user.preferredGradeScale">
    <option value="UIAA">UIAA</option>
    <option value="French">French</option>
    <option value="American">American</option>
  </select>

  <br><br>

  <label>Average Grade</label><br>
  <input
    type="text"
    [(ngModel)]="user.averageGrade">

  <br><br>

  <button>
    Save Profile
  </button>

</div>

<div class="profile-card">

  <h3>Statistics</h3>

  <p>Ascents: -</p>
  <p>Projects: -</p>
  <p>Favorite Area: -</p>
