<section class="auth-page">

  <div class="auth-card">

    <div class="auth-header">
      <p class="eyebrow">ClimbConnect</p>
      <h1>Registrieren</h1>
      <p>Erstelle ein Konto, um deine Kletterdaten und dein Profil zu speichern.</p>
    </div>

    <form
      class="auth-form"
      (submit)="register(username.value, email.value, password.value, confirmPassword.value); $event.preventDefault()">

      <div class="form-field">
        <label for="username">Benutzername</label>
        <input
          id="username"
          #username
          type="text"
          placeholder="Dein Benutzername"
          autocomplete="username">
      </div>

      <div class="form-field">
        <label for="email">E-Mail</label>
        <input
          id="email"
          #email
          type="email"
          placeholder="deine.email@example.com"
          autocomplete="email">
      </div>

      <div class="form-field">
        <label for="password">Passwort</label>
        <input
          id="password"
          #password
          type="password"
          placeholder="Mindestens 8 Zeichen"
          autocomplete="new-password">
      </div>

      <div class="form-field">
        <label for="confirmPassword">Passwort wiederholen</label>
        <input
          id="confirmPassword"
          #confirmPassword
          type="password"
          placeholder="Passwort erneut eingeben"
          autocomplete="new-password">
      </div>

      @if (errorMessage) {
        <div class="error-box">
          {{ errorMessage }}
        </div>
      }

      <button type="submit" class="auth-button">
        Konto erstellen
      </button>

    </form>

    <p class="auth-switch">
      Du hast schon ein Konto?
      <a href="/login">Jetzt anmelden</a>
    </p>

  </div>

</section>
