<section class="auth-page">

  <div class="auth-card">

    <svg class="auth-mark" viewBox="0 0 64 64" aria-hidden="true">
      <rect width="64" height="64" rx="14" fill="var(--ink-950)"/>
      <path d="M8 46 L24 20 L31 31 L38 16 L56 46 Z" fill="var(--amber-500)"/>
      <path d="M14 46 Q24 32 30 33 T39 21" fill="none" stroke="var(--paper-50)" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.2 6"/>
      <circle cx="39" cy="21" r="3" fill="var(--paper-50)"/>
    </svg>

    <div class="auth-header">
      <p class="eyebrow">ClimbConnect</p>
      <h1>Anmelden</h1>
      <p>Melde dich an, um dein Profil und deine Kletterdaten zu verwalten.</p>
    </div>

    <form
      class="auth-form"
      (submit)="login(email.value, password.value); $event.preventDefault()">

      <div class="form-field">
        <label for="email">E-Mail</label>
        <input
          id="email"
          #email
          type="email"
          placeholder="deine.email@example.com"
          autocomplete="email">
      </div>

      <div class="form-field">
        <label for="password">Passwort</label>
        <input
          id="password"
          #password
          type="password"
          placeholder="Dein Passwort"
          autocomplete="current-password">
      </div>

      @if (errorMessage) {
        <div class="error-box">
          {{ errorMessage }}
        </div>
      }

      <button type="submit" class="btn btn-primary auth-button">
        Anmelden
      </button>

    </form>

    <p class="auth-switch">
      Noch kein Konto?
      <a routerLink="/register">Jetzt registrieren</a>
    </p>

  </div>

</section>
