<nav class="menu">

  <div class="logo">
    ClimbConnect
  </div>

  <div class="actions">

    <a routerLink="/home" class="action-item">
      Home
    </a>

    <a routerLink="/areas" class="action-item">
      Areas
    </a>

    @if (isAdmin) {
      <a routerLink="/admin" class="action-item">
        Admin
      </a>
    }

    <a routerLink="/profile" class="action-item">
      Profile
    </a>

    @if (!authenticated) {

      <a routerLink="/login" class="action-item">
        Login
      </a>

      <a routerLink="/register" class="action-item">
        Register
      </a>

    } @else {

      <button class="action-item logout-btn" (click)="logout()">
        Logout
      </button>

    }

  </div>

</nav>
